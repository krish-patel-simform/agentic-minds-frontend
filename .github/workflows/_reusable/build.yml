name: Reusable Build

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment: dev | prod'
      node-version:
        required: false
        type: string
        default: '20.x'
    secrets:
      VITE_JSON_SERVER_BASE_URL:
        required: true
      VITE_API_BASE_URL:
        required: true
    outputs:
      artifact-name:
        description: 'Name of the uploaded build artifact'
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    outputs:
      artifact-name: dist-${{ inputs.environment }}-${{ github.sha }}
    env:
      VITE_JSON_SERVER_BASE_URL: ${{ secrets.VITE_JSON_SERVER_BASE_URL }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.environment }}-${{ github.sha }}
          path: dist
          retention-days: 7
          if-no-files-found: error
