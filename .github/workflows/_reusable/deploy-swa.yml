name: Reusable Deploy to Azure Static Web Apps

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment: dev | prod'
      artifact-name:
        required: true
        type: string
      deployment-environment-name:
        required: false
        type: string
        default: ''
        description: 'Named SWA environment (used for PR previews). Empty = production.'
      pr-number:
        required: false
        type: string
        default: ''
      action:
        required: false
        type: string
        default: 'upload'
        description: 'upload | close (close tears down a PR preview)'
    secrets:
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: true
    outputs:
      preview-url:
        description: 'Deployed static site URL'
        value: ${{ jobs.deploy.outputs.preview-url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    outputs:
      preview-url: ${{ steps.deploy.outputs.static_web_app_url }}
    steps:
      - name: Download build artifact
        if: inputs.action == 'upload'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: ${{ inputs.action }}
          app_location: 'dist'
          output_location: ''
          skip_app_build: true
          deployment_environment: ${{ inputs.deployment-environment-name }}
