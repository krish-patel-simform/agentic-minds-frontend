name: Deploy - Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_reusable/build.yml
    with:
      environment: prod
    secrets:
      VITE_JSON_SERVER_BASE_URL: ${{ secrets.PROD_VITE_JSON_SERVER_BASE_URL }}
      VITE_API_BASE_URL: ${{ secrets.PROD_VITE_API_BASE_URL }}

  # `environment: prod` on the reusable workflow's jobs enforces any required
  # reviewers configured on the "prod" GitHub Environment before this runs.
  deploy:
    needs: build
    uses: ./.github/workflows/_reusable/deploy-swa.yml
    with:
      environment: prod
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      action: upload
    secrets:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.PROD_AZURE_STATIC_WEB_APPS_API_TOKEN }}
