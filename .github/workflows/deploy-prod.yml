name: Deploy - Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # `environment: prod` enforces any required reviewers configured on the
  # "prod" GitHub Environment before this job runs.
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_JSON_SERVER_BASE_URL: ${{ secrets.PROD_VITE_JSON_SERVER_BASE_URL }}
          VITE_API_BASE_URL: ${{ secrets.PROD_VITE_API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.PROD_AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: 'dist'
          output_location: ''
          skip_app_build: true
