name: PR Preview (Azure Static Web Apps)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [develop]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    if: github.event.action != 'closed'
    uses: ./.github/workflows/_reusable/build.yml
    with:
      environment: dev
    secrets:
      VITE_JSON_SERVER_BASE_URL: ${{ secrets.DEV_VITE_JSON_SERVER_BASE_URL }}
      VITE_API_BASE_URL: ${{ secrets.DEV_VITE_API_BASE_URL }}

  deploy-preview:
    if: github.event.action != 'closed'
    needs: build
    uses: ./.github/workflows/_reusable/deploy-swa.yml
    with:
      environment: dev
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      deployment-environment-name: pr-${{ github.event.pull_request.number }}
      action: upload
    secrets:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.DEV_AZURE_STATIC_WEB_APPS_API_TOKEN }}

  close-preview:
    if: github.event.action == 'closed'
    uses: ./.github/workflows/_reusable/deploy-swa.yml
    with:
      environment: dev
      artifact-name: 'unused'
      deployment-environment-name: pr-${{ github.event.pull_request.number }}
      action: close
    secrets:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.DEV_AZURE_STATIC_WEB_APPS_API_TOKEN }}
