name: PR Preview (Azure Static Web Apps)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [develop]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: dev
    steps:
      - uses: actions/checkout@v4
        if: github.event.action != 'closed'

      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci
        if: github.event.action != 'closed'

      - run: npm run build
        if: github.event.action != 'closed'
        env:
          VITE_JSON_SERVER_BASE_URL: ${{ secrets.DEV_VITE_JSON_SERVER_BASE_URL }}
          VITE_API_BASE_URL: ${{ secrets.DEV_VITE_API_BASE_URL }}

      - name: Deploy preview
        if: github.event.action != 'closed'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.DEV_AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: 'dist'
          output_location: ''
          skip_app_build: true
          deployment_environment: pr-${{ github.event.pull_request.number }}

      - name: Close preview
        if: github.event.action == 'closed'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.DEV_AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
          deployment_environment: pr-${{ github.event.pull_request.number }}
